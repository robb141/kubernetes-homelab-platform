server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Static UI
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service (Docker Compose DNS name: backend)
    location /health {
        proxy_pass http://backend:8000/health;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
    }
}
