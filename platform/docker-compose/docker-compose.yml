services:
  backend:
    build:
      context: ../../apps/backend
    image: homelab-api:0.1.0
    environment:
      ENVIRONMENT: compose
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'')" || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../../apps/frontend
    image: homelab-frontend:0.1.0
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
