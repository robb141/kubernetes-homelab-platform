apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/robb141/kubernetes-homelab-platform.git
    targetRevision: main
    path: platform/helm/homelab
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
