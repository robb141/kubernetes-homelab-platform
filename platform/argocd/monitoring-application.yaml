apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.2.1
    helm:
      releaseName: monitoring
      values: |
        fullnameOverride: monitoring

        grafana:
          adminPassword: admin

        prometheus:
          prometheusSpec:
            retention: 2d
            serviceMonitorSelectorNilUsesHelmValues: true
            serviceMonitorNamespaceSelector: {}

          additionalServiceMonitors:
            - name: homelab-backend-dev
              namespaceSelector:
                matchNames:
                  - platform-dev
              selector:
                matchLabels:
                  app.kubernetes.io/name: homelab-backend
              endpoints:
                - port: http
                  path: /metrics
                  interval: 15s

            - name: homelab-backend-staging
              namespaceSelector:
                matchNames:
                  - platform-staging
              selector:
                matchLabels:
                  app.kubernetes.io/name: homelab-backend
              endpoints:
                - port: http
                  path: /metrics
                  interval: 15s
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
