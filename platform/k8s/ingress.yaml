apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab
  namespace: homelab
spec:
  ingressClassName: nginx
  rules:
    - host: homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
